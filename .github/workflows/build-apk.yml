name: Build AnBaLan APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Ghép bản 2.6.0
        run: |
          cp -R NovaVPN-WireGuard/NovaVPN-WireGuard/NovaVPN-WireGuard/. \
          NovaVPN-WireGuard/NovaVPN-WireGuard/

      - name: Build AnBaLan 2.6.0
        working-directory: NovaVPN-WireGuard/NovaVPN-WireGuard
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug lintDebug

      - uses: actions/upload-artifact@v4
        with:
          name: AnBaLan-2.6.0-APK
          path: NovaVPN-WireGuard/NovaVPN-WireGuard/app/build/outputs/apk/debug/*.apk
