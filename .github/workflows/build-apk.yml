name: Build AnBaLan APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Allow Gradle wrapper
        run: chmod +x NovaVPN-WireGuard/gradlew

      - name: Build AnBaLan 2.3.0
        working-directory: NovaVPN-WireGuard
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AnBaLan-2.3.0-APK
          path: NovaVPN-WireGuard/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
