name: Build AnBaLan 2.6.0 APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Merge Layer 3 into Layer 2 Project
      run: |
        echo "=== Checking directory structure ==="
        LAYER2_DIR="NovaVPN-WireGuard/NovaVPN-WireGuard"
        LAYER3_DIR="NovaVPN-WireGuard/NovaVPN-WireGuard/NovaVPN-WireGuard"
        
        if [ -d "$LAYER3_DIR" ]; then
          echo "Layer 3 found. Merging into Layer 2..."
          rsync -av --remove-source-files "$LAYER3_DIR/" "$LAYER2_DIR/"
          rm -rf "$LAYER3_DIR"
          echo "Merge complete."
        else
          echo "Layer 3 directory not found, skipping merge."
        fi

    - name: Grant Execute Permission for Gradlew
      working-directory: ./NovaVPN-WireGuard/NovaVPN-WireGuard
      run: chmod +x gradlew

    - name: Run Lint Debug
      working-directory: ./NovaVPN-WireGuard/NovaVPN-WireGuard
      run: ./gradlew lintDebug --stacktrace

    - name: Assemble Debug APK
      working-directory: ./NovaVPN-WireGuard/NovaVPN-WireGuard
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: AnBaLan-2.6.0-APK
        path: NovaVPN-WireGuard/NovaVPN-WireGuard/app/build/outputs/apk/debug/*.apk
        retention-days: 14
